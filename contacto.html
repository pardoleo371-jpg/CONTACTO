<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo 601 - Formulario de Contacto</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d2671, #c33764);
        }

        .contenedor{
            width: 350px;
        }

        .formulario{
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label{
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }

        input{
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus{
            border-color: #c33764;
            outline: none;
            box-shadow: 0 0 8px rgba(195,55,100,0.4);
        }

        button{
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #c33764;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #a52a52;
        }

        .grupo{
            margin-bottom: 10px;
        }

        .footer{
            text-align: center;
            margin-top: 15px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <div class="formulario">

            <h1>Contacto</h1>

            <form>

                <div class="grupo">
                    <label>Nombre:</label>
                    <input type="text" required>
                </div>

                <div class="grupo">
                    <label>Apellido:</label>
                    <input type="text" required>
                </div>

                <div class="grupo">
                    <label>Teléfono:</label>
                    <input 
                        type="tel"
                        maxlength="10"
                        placeholder="5512345678"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        required>
                </div>

                <button type="submit">Enviar Datos</button>

            </form>

        </div>

        <div class="footer">
            Leonardo 601
        </div>

    </div>

</body>
</html>
